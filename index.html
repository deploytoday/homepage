<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deploy Today — we help you grow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efeae0;
    --ink: #1f1f1f;
    --ink-soft: #8a857a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .stage {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 8vw;
  }

  .headline {
    font-weight: 300;
    font-style: italic;
    font-size: clamp(56px, 9vw, 132px);
    line-height: 1;
    letter-spacing: -0.035em;
    color: var(--ink);
    user-select: none;
    font-variation-settings: "opsz" 144;
  }

  .subhead {
    margin-top: clamp(24px, 3.5vh, 40px);
    font-family: 'Fraunces', serif;
    font-size: clamp(13px, 1.05vw, 15px);
    letter-spacing: 0.02em;
    color: var(--ink-soft);
    font-weight: 400;
    font-style: normal;
  }

  /* Email link — small monospace contact below subhead */
  .email-link {
    margin-top: clamp(40px, 6vh, 72px);
    display: inline-block;
    color: var(--ink-soft);
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s ease;
    line-height: 0;
  }
  .email-link:hover { color: var(--ink); }
  .email-link:hover .underline { opacity: 1; }

  .email-svg { display: block; }
  .underline {
    display: block;
    height: 1px;
    background: currentColor;
    margin-top: 4px;
    opacity: 0.4;
    transition: opacity 0.2s ease;
  }
</style>
</head>
<body>

  <svg class="bg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <pattern id="dotgrid" width="28" height="28" patternUnits="userSpaceOnUse">
        <circle cx="14" cy="14" r="1" fill="rgba(31, 31, 31, 0.18)"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dotgrid)"/>
  </svg>

  <main class="stage">
    <h1 class="headline">Deploy Today</h1>
    <p class="subhead">we help you grow</p>

    <!--
      Crawler-resistant email:
      1. Rendered in SVG <tspan> elements, each with an explicit x coordinate.
      2. The DOM order of the tspans is shuffled — only the x attributes restore
         visual order. A scraper extracting textContent gets gibberish.
      3. The @ symbol is injected via String.fromCharCode(64) at click time, and
         the address itself is split into fragments — there is no plain-text
         "hello@deploytoday.tech" anywhere in the source.
    -->
    <a class="email-link" id="emailLink" href="#" rel="nofollow noopener" aria-label="Open email composer to contact us">
      <svg class="email-svg" width="200" height="20" viewBox="0 0 200 20"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <text y="15"
              font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace"
              font-size="13" fill="currentColor">
          <tspan x="63">e</tspan>
          <tspan x="126">d</tspan>
          <tspan x="18">l</tspan>
          <tspan x="171">e</tspan>
          <tspan x="99">y</tspan>
          <tspan x="0">h</tspan>
          <tspan x="144">y</tspan>
          <tspan x="45">&#64;</tspan>
          <tspan x="189">h</tspan>
          <tspan x="81">l</tspan>
          <tspan x="117">o</tspan>
          <tspan x="27">l</tspan>
          <tspan x="153">.</tspan>
          <tspan x="72">p</tspan>
          <tspan x="108">t</tspan>
          <tspan x="180">c</tspan>
          <tspan x="36">o</tspan>
          <tspan x="9">e</tspan>
          <tspan x="162">t</tspan>
          <tspan x="54">d</tspan>
          <tspan x="135">a</tspan>
          <tspan x="90">o</tspan>
        </text>
      </svg>
      <span class="underline"></span>
    </a>
  </main>

  <script>
    // Build the mailto: from disjoint fragments at click time.
    // Nothing here looks like an email to a static crawler.
    (function () {
      var el = document.getElementById('emailLink');
      if (!el) return;
      el.addEventListener('click', function (e) {
        e.preventDefault();
        var user   = ['hel', 'lo'].join('');
        var domain = ['deploy', 'today'].join('');
        var tld    = ['te', 'ch'].join('');
        var addr   = user + String.fromCharCode(64) + domain + '.' + tld;
        window.location.href = 'mai' + 'lto:' + addr;
      });
    })();
  </script>

</body>
</html>
